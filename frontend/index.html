<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flight Radar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'Courier New', monospace; }
      #filters {
    position: absolute;
    top: 40px;
    right: 5px;
    z-index: 1000;


    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;

    padding: 10px 14px;

    box-shadow:
        0 4px 20px rgba(0,0,0,0.45),
        0 0 10px rgba(255,170,0,0.08);

    font-family: 'Courier New', monospace;
}
#panel.open ~ #map {
  right: 320px;
}

#panel {
  position: fixed;
  top: 80px;
  right: -320px;
  bottom: 0;
  width: 320px;
  background: #0d0d18;
  border-left: 1px solid #1a1a2e;
  z-index: 999;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
}

#panel.open { right: 0; }

#panel-header {
  padding: 16px;
  border-bottom: 1px solid #1a1a2e;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

#panel-callsign {
  font-size: 22px;
  font-weight: 700;
  color: #ffd700;
  letter-spacing: 0.1em;
}

#panel-icao {
  font-size: 10px;
  color: #444;
  margin-top: 4px;
  letter-spacing: 0.1em;
}

#panel-close {
  background: none;
  border: 1px solid #222;
  color: #555;
  width: 28px; height: 28px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
}

#panel-close:hover { border-color: #555; color: #ccc; }

#panel-body { padding: 16px; }

.panel-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #0f0f1a;
}

.panel-label {
  font-size: 10px;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.panel-value {
  font-size: 12px;
  color: #ccc;
  font-weight: 500;
}
#filter-country {
    background: transparent;
    color: #f5f5f5;

    border: none;
    outline: none;

    font-size: 14px;
    font-weight: 500;

    cursor: pointer;

    min-width: 180px;
}

/* dropdown options */
#filter-country option {
    background: #111;
    color: white;
}
      #stats {
      position: fixed;
      top: 44px;
      left: 0;
      right: 0;
      z-index: 999;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #1a1a2e;
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 24px;
    }

    #stats span {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.08em;
    }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #222;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; color: #ccc; text-transform: uppercase; }
    #clock { font-size: 12px; color: #888; letter-spacing: 0.1em; }
    #count { font-size: 12px; color: #888; letter-spacing: 0.1em; }

      #map {
  position: fixed;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
  transition: right 0.3s ease;
}

    .plane-icon { transform-origin: center; }

    .custom-cluster {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .leaflet-popup-content-wrapper {
      background: #111;
      border: 1px solid #333;
      color: #eee;
      border-radius: 6px;
    }
    .leaflet-popup-tip { background: #111; }
  </style>
</head>
<body>

<div id="header">
  <h1>✈ Flight Radar</h1>
  <span id="count">Loading...</span>
  <span id="clock"></span>
</div>
<div id="stats">
  <span id="stat-total">—</span>
  <span id="stat-airborne">—</span>
  <span id="stat-ground">—</span>
  <span id="stat-countries">—</span>
  <span id="stat-maxspeed">—</span>
  <span id="stat-maxalt">—</span>
</div>
<div id="filters">
  <select id="filter-country" onchange="applyFilters()">
    <option value="">All Countries</option>
  </select>
</div>
<div id="panel">
  <div id="panel-header">
    <div>
      <div id="panel-callsign">—</div>
      <div id="panel-icao">—</div>
    </div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body">
    <div class="panel-row">
      <span class="panel-label">Country</span>
      <span class="panel-value" id="p-country">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Altitude</span>
      <span class="panel-value" id="p-altitude">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Speed</span>
      <span class="panel-value" id="p-speed">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Heading</span>
      <span class="panel-value" id="p-heading">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Status</span>
      <span class="panel-value" id="p-status">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Latitude</span>
      <span class="panel-value" id="p-lat">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Longitude</span>
      <span class="panel-value" id="p-lon">—</span>
    </div>
  </div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script>
const API_BASE = "https://your-backend.up.railway.app"

let allFlights = []
let filterCountry = ""
const flightMap = {}
const markers = {}

let systemStatus = "UNKNOWN" // LIVE | LIMITED | OFFLINE

// ---------------- STATUS UI ----------------
function setStatus(status, message = "") {
  systemStatus = status

  const el = document.getElementById("count")

  if (status === "LIVE") {
    el.textContent = `${allFlights.length.toLocaleString()} aircraft 🟢 LIVE`
  }

  if (status === "LIMITED") {
    el.textContent = `${allFlights.length.toLocaleString()} aircraft 🟡 LIMITED`
  }

  if (status === "OFFLINE") {
    el.textContent = `🔴 OFFLINE`
  }

  if (message) console.warn(message)
}

// ---------------- CLOCK ----------------
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toUTCString().replace('GMT', 'UTC')
}, 1000)

// ---------------- MAP ----------------
const map = L.map('map').setView([30, 10], 3)

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 18
  }
).addTo(map)

// ---------------- ICONS ----------------
function altitudeColor(altitude) {
  if (altitude === 0) return '#aaaaaa'
  if (altitude < 3000) return '#ffd700'
  if (altitude < 8000) return '#ff8c00'
  return '#00bfff'
}

function makePlaneIcon(heading, altitude) {
  const color = altitudeColor(altitude)

  return L.divIcon({
    html: `
      <svg xmlns="http://www.w3.org/2000/svg"
           width="20"
           height="20"
           viewBox="0 0 24 24"
           style="transform: rotate(${heading}deg); transform-origin:center;"
           fill="${color}">
        <path d="M12 2 L15 9 L22 9 L17 13.5 L19 21 L12 17 L5 21 L7 13.5 L2 9 L9 9 Z"/>
      </svg>
    `,
    className: 'plane-icon',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  })
}

// ---------------- CLUSTER ----------------
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 60,
  disableClusteringAtZoom: 7
})

map.addLayer(clusterGroup)

// ---------------- PANEL ----------------
function openPanel(p) {
  document.getElementById('panel-callsign').textContent = p.callsign || 'Unknown'
  document.getElementById('panel-icao').textContent = p.icao || 'N/A'
  document.getElementById('p-country').textContent = p.country || 'Unknown'
  document.getElementById('p-altitude').textContent = `${p.altitude} m`
  document.getElementById('p-speed').textContent = `${p.speed} km/h`
  document.getElementById('p-heading').textContent = `${p.heading}°`
  document.getElementById('p-lat').textContent = p.lat?.toFixed(4) || 'N/A'
  document.getElementById('p-lon').textContent = p.lon?.toFixed(4) || 'N/A'
  document.getElementById('p-status').textContent = p.on_ground ? 'On Ground' : 'Airborne'

  document.getElementById('panel').classList.add('open')
}

function closePanel() {
  document.getElementById('panel').classList.remove('open')
}

// ---------------- STATS ----------------
function updateStats(flights) {
  const airborne = flights.filter(p => !p.on_ground).length
  const ground = flights.filter(p => p.on_ground).length
  const countries = new Set(flights.map(p => p.country)).size

  const maxSpeed = flights.length
    ? Math.max(...flights.map(p => p.speed))
    : 0

  const maxAlt = flights.length
    ? Math.max(...flights.map(p => p.altitude))
    : 0

  document.getElementById('stat-total').textContent = flights.length
  document.getElementById('stat-airborne').textContent = airborne
  document.getElementById('stat-ground').textContent = ground
  document.getElementById('stat-countries').textContent = countries
  document.getElementById('stat-maxspeed').textContent = maxSpeed + ' km/h'
  document.getElementById('stat-maxalt').textContent = maxAlt + ' m'
}

// ---------------- FILTERS ----------------
function applyFilters() {
  clusterGroup.clearLayers()

  const filtered = allFlights.filter(p =>
    !filterCountry || p.country === filterCountry
  )

  const visibleMarkers = filtered
    .map(p => markers[p.icao])
    .filter(Boolean)

  clusterGroup.addLayers(visibleMarkers)
}

// ---------------- FETCH ----------------
async function loadFlights() {
  try {
    const res = await fetch(`${API_BASE}/flights`)

    if (!res.ok) {
      setStatus("OFFLINE", `HTTP ${res.status}`)
      return
    }

    const data = await res.json()

    // ---- RATE LIMIT / DEGRADED STATE ----
    if (data.error === "rate_limited") {
      allFlights = []
      updateStats([])
      setStatus("LIMITED", "API rate limited (OpenSky)")
      return
    }

    const flights = data.flights || []
    allFlights = flights

    updateStats(flights)

    // ---- INIT FILTERS ----
    const select = document.getElementById('filter-country')

    if (select.options.length === 1) {
      const countries = [...new Set(flights.map(p => p.country))].sort()

      countries.forEach(c => {
        const opt = document.createElement('option')
        opt.value = c
        opt.textContent = c
        select.appendChild(opt)
      })
    }

    const seen = new Set()
    const toAdd = []
    const toRemove = []

    flights.forEach(p => {
      seen.add(p.icao)

      if (markers[p.icao]) {
        markers[p.icao].setLatLng([p.lat, p.lon])
        markers[p.icao].setIcon(makePlaneIcon(p.heading, p.altitude))
      } else {
        const marker = L.marker([p.lat, p.lon], {
          icon: makePlaneIcon(p.heading, p.altitude)
        }).on('click', () => openPanel(p))

        markers[p.icao] = marker
        toAdd.push(marker)
      }
    })

    clusterGroup.addLayers(toAdd)

    Object.keys(markers).forEach(id => {
      if (!seen.has(id)) {
        toRemove.push(markers[id])
        delete markers[id]
      }
    })

    clusterGroup.removeLayers(toRemove)

    applyFilters()
    setStatus("LIVE")

  } catch (err) {
    console.error(err)
    setStatus("OFFLINE", err.message)
  }
}

// ---------------- START ----------------
loadFlights()
setInterval(loadFlights, 10000)
</script>
</body>
</html>
